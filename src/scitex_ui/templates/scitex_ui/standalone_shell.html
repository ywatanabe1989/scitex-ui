{% load static %}
<!DOCTYPE html>
<html lang="en" data-theme="dark">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>{{ app_label|default:"SciTeX App" }}</title>
        <link rel="stylesheet"
              href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
        <!-- scitex-ui workspace shell CSS (canonical source) -->
        <link rel="stylesheet" href="{% static 'scitex_ui/css/shell/theme.css' %}" />
        <link rel="stylesheet"
              href="{% static 'scitex_ui/css/shell/app-shell.css' %}" />
        <link rel="stylesheet"
              href="{% static 'scitex_ui/css/shell/stx-shell-sidebar.css' %}" />
        <link rel="stylesheet"
              href="{% static 'scitex_ui/css/shell/workspace-three-col.css' %}" />
        <link rel="stylesheet"
              href="{% static 'scitex_ui/css/shell/workspace.css' %}" />
        <link rel="stylesheet"
              href="{% static 'scitex_ui/css/shell/panel-resizer.css' %}" />
        <link rel="stylesheet"
              href="{% static 'scitex_ui/css/shell/resizer.css' %}" />
        <link rel="stylesheet"
              href="{% static 'scitex_ui/css/shell/standalone-resizer-pos.css' %}" />
        {% block extra_css %}{% endblock %}
    </head>
    <body class="dark-theme workspace-page footer-collapsed">
        <!--
          Standalone shell: theme CSS provided by scitex-ui.
          The React Workspace component (from scitex-ui) handles all panels:
          Console | FileTree | Viewer | App content
          No Django panes — React is the single layout owner.
        -->
        {% block app_content %}
            <div id="root"
                 data-working-dir="{{ working_dir|default:'' }}"
                 data-app-name="{{ app_name|default:'app' }}"></div>
        {% endblock %}
        {% block extra_js %}{% endblock %}
    </body>
</html>
